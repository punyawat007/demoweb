<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านพิซซา - Pizza Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #d35400;
        }
        .add-btn {
            display: inline-block;
            background-color: #27ae60;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .add-btn:hover {
            background-color: #229954;
        }
        .pizza-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .pizza-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .pizza-card img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
        }
        .pizza-name {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin: 10px 0;
        }
        .pizza-category {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin-bottom: 5px;
        }
        .pizza-price {
            color: #e74c3c;
            font-size: 20px;
            font-weight: bold;
        }
        .pizza-stock {
            color: #7f8c8d;
            font-size: 14px;
        }
        .pizza-stock.in-stock {
            color: #27ae60;
        }
        .pizza-stock.out-of-stock {
            color: #e74c3c;
        }
        .action-buttons {
            margin-top: 10px;
        }
        .edit-btn {
            background-color: #f39c12;
            color: white;
            padding: 5px 15px;
            text-decoration: none;
            border-radius: 3px;
            margin-right: 5px;
        }
        .delete-btn {
            background-color: #e74c3c;
            color: white;
            padding: 5px 15px;
            text-decoration: none;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>🍕 ร้านพิซซา Pizza Shop</h1>
    
    <!-- ปุ่มเพิ่มสินค้า -->
    <a href="/add" class="add-btn">+ เพิ่มพิซซาใหม่</a>
    
    <!-- แสดงรายการพิซซา -->
    <div class="pizza-grid">
        {% for p in pizzas %}
        <div class="pizza-card">
            <!-- แสดงรูปภาพ -->
            <img src="{{ p.image }}" alt="{{ p.name }}">
            
            <!-- ชื่อพิซซา -->
            <div class="pizza-name">{{ p.name }}</div>
            
            <!-- หมวดหมู่ -->
            <span class="pizza-category">{{ p.category_name }}</span>
            
            <!-- ราคา -->
            <div class="pizza-price">฿{{ p.price }}</div>
            
            <!-- สต็อก -->
            <div class="pizza-stock {% if p.stock > 0 %}in-stock{% else %}out-of-stock{% endif %}">
                สต็อก: {{ p.stock }} ชิ้น
            </div>
            
            <!-- ปุ่มแก้ไขและลบ -->
            <div class="action-buttons">
                <a href="/edit/{{ p.id }}" class="edit-btn">แก้ไข</a>
                <a href="/delete/{{ p.id }}" class="delete-btn" onclick="return confirm('ต้องการลบ {{ p.name }} หรือไม่?')">ลบ</a>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
